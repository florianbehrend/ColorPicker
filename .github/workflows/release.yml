name: Release

# Publishes a GitHub Release when a "release:"-prefixed commit is pushed to master
# (or on manual dispatch). The tag is taken from the library `version` in
# Color-Picker/build.gradle (tag = v<version>); if that tag already exists the run
# is skipped. The commit message (minus the prefix) becomes the release notes, and
# the library AAR is attached. JitPack consumes the created tag.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      notes:
        description: 'Release notes (used when run manually)'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    # Only proceed for manual runs or commits explicitly marked for release.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      exists: ${{ steps.ver.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so existing-tag detection works

      - name: Read library version from build.gradle
        id: ver
        run: |
          v=$(sed -nE "s/.*version[[:space:]]*=[[:space:]]*['\"]([^'\"]+)['\"].*/\1/p" Color-Picker/build.gradle | head -1)
          if [ -z "$v" ]; then
            echo "::error::Could not read 'version' from Color-Picker/build.gradle"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$v" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$v already exists — skipping release. Bump 'version' in Color-Picker/build.gradle to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: sdkmanager "platforms;android-36"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew :Color-Picker:assembleRelease test --no-daemon

      - name: Extract release notes
        id: notes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          INPUT_NOTES: ${{ github.event.inputs.notes }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            notes="$INPUT_NOTES"
          else
            # Drop the leading "release:" prefix and any whitespace right after it.
            notes="${COMMIT_MSG#release:}"
            notes="${notes#"${notes%%[![:space:]]*}"}"
          fi
          {
            echo "notes<<__EOF__"
            printf '%s\n' "$notes"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: v${{ needs.check.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: Color-Picker/build/outputs/aar/Color-Picker-release.aar
