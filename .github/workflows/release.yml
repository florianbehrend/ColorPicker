name: Release

# Build, test, and publish a GitHub Release when a commit whose message starts
# with "release:" is pushed to master (or when run manually via the Actions tab).
# The message (minus the prefix) becomes the release notes. A new semver tag is
# auto-derived (patch bump) and the library AAR is attached. JitPack consumes the
# created tag (com.github.<user>.<repo>:Color-Picker:<tag>).

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      notes:
        description: 'Release notes (used when run manually)'
        required: false
        default: ''

# Prevent overlapping release runs from racing on tags.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Run on manual dispatch, or for push commits marked with the "release:" prefix.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the version bump can read the last tag

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: sdkmanager "platforms;android-36"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew :Color-Picker:assembleRelease test --no-daemon

      - name: Extract release notes from commit message
        id: notes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          INPUT_NOTES: ${{ github.event.inputs.notes }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            notes="$INPUT_NOTES"
          else
            # Drop the leading "release:" prefix and any whitespace right after it.
            notes="${COMMIT_MSG#release:}"
            notes="${notes#"${notes%%[![:space:]]*}"}"
          fi
          {
            echo "notes<<__EOF__"
            printf '%s\n' "$notes"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Compute next version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master
          tag_prefix: v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: Color-Picker/build/outputs/aar/Color-Picker-release.aar
