name: Release

# Build, test, and publish a GitHub Release when a commit whose message starts
# with "release:" is pushed to main. The message (minus the prefix) becomes the
# release notes. A new semver tag is auto-derived (patch bump) and the library
# AAR is attached. JitPack consumes the created tag
# (com.github.<user>.<repo>:Color-Picker:<tag>).

on:
  push:
    branches: [main]

# Prevent overlapping release runs from racing on tags.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Only run for commits explicitly marked for release.
    if: startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the version bump can read the last tag

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 37
        run: sdkmanager "platforms;android-37" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew :Color-Picker:assembleRelease test --no-daemon

      - name: Extract release notes from commit message
        id: notes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Drop the leading "release:" prefix and any whitespace right after it.
          notes="${COMMIT_MSG#release:}"
          notes="${notes#"${notes%%[![:space:]]*}"}"
          {
            echo "notes<<__EOF__"
            printf '%s\n' "$notes"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Compute next version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: Color-Picker/build/outputs/aar/Color-Picker-release.aar
